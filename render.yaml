services:
  - type: web
    name: maureen-boutique-ims
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12 # Assuming a standard modern Python
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
